# proof-manifest.toml
#
# Canonical register of proof numbers (test counts) that may be cited on the public
# site (index.html, GO-LIVE.md, case-studies/*.html, README.md, etc.).
#
# Each entry's `value` is the ONLY number that is allowed to be cited for that repo
# anywhere in committed site content. It is produced by ACTUALLY RUNNING the suite
# named in `source_cmd`, in `source_repo`, and reading the pytest summary line's
# "N passed" count (never "collected", never "passed + skipped" summed together).
#
# scripts/check_proof_numbers.py reads this file and fails a commit if any citation
# in site content contradicts it. See that script's module docstring for the exact
# matching/association rules.
#
# Key = the repo keyword as it is expected to appear in site text (e.g. "mcp-factory").

